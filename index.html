<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMatch – Movie Recommender</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-orange: #FF5E1A;
    --neon-pink: #FF2D78;
    --electric-cyan: #00F0FF;
    --gold: #FFD449;
    --deep-bg: #0A0A12;
    --card-bg: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #F0EDFF;
    --muted: rgba(240,237,255,0.45);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep-bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 10% 20%, rgba(255,94,26,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 85% 80%, rgba(255,45,120,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(0,240,255,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
    animation: bgPulse 8s ease-in-out infinite alternate;
  }

  @keyframes bgPulse {
    0% { opacity: 0.6; }
    100% { opacity: 1; }
  }

  /* Grid lines overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  /* Header */
  header {
    padding: 40px 0 30px;
    text-align: center;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
    color: #fff;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 20px;
    text-transform: uppercase;
    box-shadow: 0 0 20px rgba(255,94,26,0.4);
    animation: badgePop 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes badgePop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 88px);
    letter-spacing: 2px;
    line-height: 0.95;
    background: linear-gradient(135deg, #fff 0%, var(--gold) 40%, var(--neon-orange) 70%, var(--neon-pink) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: titleSlide 0.7s ease both 0.2s;
  }

  @keyframes titleSlide {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    margin-top: 10px;
    letter-spacing: 0.3px;
    animation: titleSlide 0.7s ease both 0.35s;
  }

  /* Chat window */
  .chat-window {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    animation: windowRise 0.7s ease both 0.5s;
  }

  @keyframes windowRise {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .chat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }

  .bot-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 16px rgba(255,94,26,0.5);
    flex-shrink: 0;
    animation: avatarPulse 3s ease-in-out infinite;
  }

  @keyframes avatarPulse {
    0%, 100% { box-shadow: 0 0 16px rgba(255,94,26,0.5); }
    50% { box-shadow: 0 0 28px rgba(255,45,120,0.7); }
  }

  .bot-info .bot-name {
    font-weight: 600;
    font-size: 15px;
  }

  .bot-info .bot-status {
    font-size: 12px;
    color: var(--electric-cyan);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--electric-cyan);
    animation: dotPulse 1.5s ease-in-out infinite;
  }

  @keyframes dotPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* Messages */
  .messages {
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 300px;
    max-height: 480px;
    overflow-y: auto;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  .msg {
    display: flex;
    gap: 10px;
    animation: msgIn 0.35s cubic-bezier(0.34,1.4,0.64,1) both;
  }

  @keyframes msgIn {
    from { transform: translateY(12px) scale(0.96); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }

  .msg.bot { align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
  }

  .msg.bot .msg-avatar {
    background: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
    box-shadow: 0 0 10px rgba(255,94,26,0.3);
  }

  .msg.user .msg-avatar {
    background: linear-gradient(135deg, var(--electric-cyan), #007FFF);
    box-shadow: 0 0 10px rgba(0,240,255,0.3);
  }

  .msg-bubble {
    max-width: 75%;
    padding: 13px 17px;
    border-radius: 18px;
    font-size: 14.5px;
    line-height: 1.6;
  }

  .msg.bot .msg-bubble {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-top-left-radius: 4px;
  }

  .msg.user .msg-bubble {
    background: linear-gradient(135deg, rgba(255,94,26,0.3), rgba(255,45,120,0.3));
    border: 1px solid rgba(255,94,26,0.25);
    border-top-right-radius: 4px;
    text-align: right;
  }

  /* Slider input area */
  .input-area {
    padding: 20px 24px 24px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }

  .genre-sliders {
    display: none;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 20px;
    animation: fadeIn 0.4s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .genre-sliders.visible { display: flex; }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .genre-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    width: 68px;
    flex-shrink: 0;
  }

  .genre-label.action { color: var(--neon-orange); }
  .genre-label.comedy { color: var(--gold); }
  .genre-label.scifi  { color: var(--electric-cyan); }
  .genre-label.romance { color: var(--neon-pink); }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    transition: all 0.2s;
  }

  input#action  { background: linear-gradient(to right, var(--neon-orange) var(--pct, 50%), rgba(255,255,255,0.1) var(--pct, 50%)); }
  input#comedy  { background: linear-gradient(to right, var(--gold) var(--pct, 50%), rgba(255,255,255,0.1) var(--pct, 50%)); }
  input#scifi   { background: linear-gradient(to right, var(--electric-cyan) var(--pct, 50%), rgba(255,255,255,0.1) var(--pct, 50%)); }
  input#romance { background: linear-gradient(to right, var(--neon-pink) var(--pct, 50%), rgba(255,255,255,0.1) var(--pct, 50%)); }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 8px rgba(255,255,255,0.5);
    transition: transform 0.15s, box-shadow 0.15s;
  }

  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
    box-shadow: 0 0 14px rgba(255,255,255,0.8);
  }

  .slider-val {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    width: 24px;
    text-align: right;
    color: #fff;
  }

  /* Submit button */
  .submit-btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(255,94,26,0.4);
    display: none;
  }

  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(255,45,120,0.5);
  }

  .submit-btn:active { transform: scale(0.98); }
  .submit-btn.visible { display: block; animation: fadeIn 0.4s ease both; }

  /* Results cards */
  .results-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }

  .movie-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    transition: transform 0.2s, background 0.2s;
    animation: cardIn 0.4s cubic-bezier(0.34,1.4,0.64,1) both;
  }

  .movie-card:hover {
    transform: translateX(4px);
    background: rgba(255,255,255,0.07);
  }

  @keyframes cardIn {
    from { transform: translateX(-20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .movie-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    line-height: 1;
    min-width: 32px;
    background: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .movie-info { flex: 1; }
  .movie-title { font-weight: 600; font-size: 15px; }
  .movie-score-bar {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }

  .movie-score-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--neon-orange), var(--neon-pink));
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
    width: 0;
  }

  .movie-score-num {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--gold);
    font-weight: 700;
    white-space: nowrap;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 10px 4px;
  }

  .typing span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
    animation: typingBounce 1.2s ease-in-out infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-8px); background: var(--neon-orange); }
  }

  /* Restart */
  .restart-btn {
    display: none;
    margin-top: 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
    width: 100%;
  }

  .restart-btn:hover { background: rgba(255,255,255,0.1); }
  .restart-btn.visible { display: block; animation: fadeIn 0.4s ease both; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-badge">🎬 AI Powered</div>
    <h1>CineMatch</h1>
    <p class="subtitle">Tell us what you love — we'll find your next obsession.</p>
  </header>

  <div class="chat-window">
    <div class="chat-header">
      <div class="bot-avatar">🎥</div>
      <div class="bot-info">
        <div class="bot-name">CineBot</div>
        <div class="bot-status"><span class="status-dot"></span> Online & ready</div>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <div class="genre-sliders" id="genreSliders">
        <div class="slider-row">
          <span class="genre-label action">Action</span>
          <input type="range" id="action" min="1" max="10" value="5">
          <span class="slider-val" id="actionVal">5</span>
        </div>
        <div class="slider-row">
          <span class="genre-label comedy">Comedy</span>
          <input type="range" id="comedy" min="1" max="10" value="5">
          <span class="slider-val" id="comedyVal">5</span>
        </div>
        <div class="slider-row">
          <span class="genre-label scifi">Sci-Fi</span>
          <input type="range" id="scifi" min="1" max="10" value="5">
          <span class="slider-val" id="scifiVal">5</span>
        </div>
        <div class="slider-row">
          <span class="genre-label romance">Romance</span>
          <input type="range" id="romance" min="1" max="10" value="5">
          <span class="slider-val" id="romanceVal">5</span>
        </div>
      </div>
      <button class="submit-btn" id="submitBtn" onclick="getRecommendations()">Find My Movies →</button>
      <button class="restart-btn" id="restartBtn" onclick="restart()">🔄 Start Over</button>
    </div>
  </div>
</div>

<script>
  const movies = [
    { name: "Interstellar",  action: 5, comedy: 1, scifi: 10, romance: 2  },
    { name: "Titanic",       action: 1, comedy: 2, scifi: 0,  romance: 10 },
    { name: "Avengers",      action: 10,comedy: 5, scifi: 8,  romance: 1  },
    { name: "John Wick",     action: 10,comedy: 1, scifi: 2,  romance: 0  },
    { name: "The Notebook",  action: 1, comedy: 2, scifi: 0,  romance: 10 },
    { name: "Inception",     action: 7, comedy: 2, scifi: 10, romance: 1  },
  ];

  const emojis = { "Interstellar":"🚀", "Titanic":"🚢", "Avengers":"🦸", "John Wick":"🔫", "The Notebook":"📖", "Inception":"🌀" };

  function calculateScore(movie, a, c, s, r) {
    return (10 - Math.abs(movie.action - a))
         + (10 - Math.abs(movie.comedy - c))
         + (10 - Math.abs(movie.scifi - s))
         + (10 - Math.abs(movie.romance - r));
  }

  function addMsg(type, content, delay = 0) {
    return new Promise(resolve => {
      setTimeout(() => {
        const msgs = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        const avatar = type === 'bot' ? '🎥' : '👤';
        div.innerHTML = `
          <div class="msg-avatar">${avatar}</div>
          <div class="msg-bubble">${content}</div>`;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
        resolve();
      }, delay);
    });
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typingMsg';
    div.innerHTML = `<div class="msg-avatar">🎥</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingMsg');
    if (t) t.remove();
  }

  async function init() {
    showTyping();
    await new Promise(r => setTimeout(r, 900));
    removeTyping();
    await addMsg('bot', "Hey there, movie lover! 🍿 I'm <strong>CineBot</strong> — your personal film curator.");
    showTyping();
    await new Promise(r => setTimeout(r, 800));
    removeTyping();
    await addMsg('bot', "Rate each genre from <strong>1 to 10</strong> based on how much you enjoy it, and I'll find your perfect match! 🎬");
    document.getElementById('genreSliders').classList.add('visible');
    document.getElementById('submitBtn').classList.add('visible');
  }

  // Slider live update
  ['action','comedy','scifi','romance'].forEach(id => {
    const slider = document.getElementById(id);
    const val = document.getElementById(id + 'Val');
    slider.addEventListener('input', function() {
      val.textContent = this.value;
      const pct = ((this.value - 1) / 9 * 100).toFixed(1) + '%';
      this.style.setProperty('--pct', pct);
    });
    // Init fill
    const initPct = ((slider.value - 1) / 9 * 100).toFixed(1) + '%';
    slider.style.setProperty('--pct', initPct);
  });

  async function getRecommendations() {
    const a = +document.getElementById('action').value;
    const c = +document.getElementById('comedy').value;
    const s = +document.getElementById('scifi').value;
    const r = +document.getElementById('romance').value;

    document.getElementById('genreSliders').classList.remove('visible');
    document.getElementById('submitBtn').classList.remove('visible');

    await addMsg('user', `Action: <strong>${a}</strong> &nbsp;|&nbsp; Comedy: <strong>${c}</strong> &nbsp;|&nbsp; Sci-Fi: <strong>${s}</strong> &nbsp;|&nbsp; Romance: <strong>${r}</strong>`);

    showTyping();
    await new Promise(r => setTimeout(r, 1200));
    removeTyping();
    await addMsg('bot', "Analyzing your taste... 🔍 Crunching through the database...");

    showTyping();
    await new Promise(r => setTimeout(r, 1000));
    removeTyping();

    const scored = movies.map(m => ({
      ...m,
      score: calculateScore(m, a, c, s, r),
      emoji: emojis[m.name] || '🎬'
    })).sort((x, y) => y.score - x.score);

    const maxScore = 40;

    const cardsHTML = `<div class="results-grid">${
      scored.map((m, i) => `
        <div class="movie-card" style="animation-delay:${i * 0.08}s">
          <div class="movie-rank">#${i+1}</div>
          <div class="movie-info">
            <div class="movie-title">${m.emoji} ${m.name}</div>
            <div class="movie-score-bar">
              <div class="movie-score-fill" data-pct="${(m.score/maxScore*100).toFixed(0)}"></div>
            </div>
          </div>
          <div class="movie-score-num">${m.score}/40</div>
        </div>`).join('')
    }</div>`;

    await addMsg('bot', `Here are your top picks! The higher the score, the better it matches your taste: 🎯<br><br>${cardsHTML}`);

    // Animate score bars
    setTimeout(() => {
      document.querySelectorAll('.movie-score-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    }, 200);

    showTyping();
    await new Promise(r => setTimeout(r, 800));
    removeTyping();
    await addMsg('bot', `Your top pick is <strong>${scored[0].emoji} ${scored[0].name}</strong> with a ${scored[0].score}/40 match score! Happy watching! 🥂`);

    document.getElementById('restartBtn').classList.add('visible');
  }

  function restart() {
    const msgs = document.getElementById('messages');
    msgs.innerHTML = '';
    ['action','comedy','scifi','romance'].forEach(id => {
      document.getElementById(id).value = 5;
      document.getElementById(id + 'Val').textContent = 5;
      const initPct = ((5 - 1) / 9 * 100).toFixed(1) + '%';
      document.getElementById(id).style.setProperty('--pct', initPct);
    });
    document.getElementById('restartBtn').classList.remove('visible');
    document.getElementById('genreSliders').classList.remove('visible');
    document.getElementById('submitBtn').classList.remove('visible');
    init();
  }

  init();
</script>
</body>
</html>
